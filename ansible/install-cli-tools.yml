---
- name: Install useful command line tools
  hosts: localhost
  connection: local
  become: yes

  tasks:
    - name: Ensure standard CLI tools are installed
      ansible.builtin.package:
        name:
          - htop
          - tmux
          - ripgrep
          - fzf
          - jq
          - tree
          - curl
          - wget
          - git
          - mosh
        state: present
      tags: [standard_tools]

    - name: Install bottom (btm)
      block:
        - name: Try installing bottom via package manager
          ansible.builtin.package:
            name: bottom
            state: present
      rescue:
        - name: Fallback to manual binary installation for bottom
          block:
            - name: Get machine architecture
              ansible.builtin.command: uname -m
              register: arch_out
              changed_when: false

            - name: Set bottom architecture variable for x86_64
              ansible.builtin.set_fact:
                btm_arch: "x86_64-unknown-linux-gnu"
              when: arch_out.stdout == 'x86_64'

            - name: Set bottom architecture variable for aarch64
              ansible.builtin.set_fact:
                btm_arch: "aarch64-unknown-linux-gnu"
              when: arch_out.stdout in ['aarch64', 'arm64']

            - name: Download and install bottom binary
              ansible.builtin.unarchive:
                src: "https://github.com/ClementTsang/bottom/releases/latest/download/bottom_{{ btm_arch }}.tar.gz"
                dest: /usr/local/bin
                remote_src: yes
                extra_opts:
                  - btm
              when: btm_arch is defined
      tags: [bottom, btm]
