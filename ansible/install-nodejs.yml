---
- name: Install Node.js
  hosts: "{{ target_hosts | default('localhost') }}"
  gather_facts: yes
  vars:
    node_version: "24.14.0"
    node_arch: "{{ 'linux-arm64' if ansible_facts['architecture'] == 'aarch64' else 'linux-x64' }}"
    node_install_dir: "{{ lookup('env', 'HOME') }}/.local/lib/nodejs"
    node_bin_dir: "{{ lookup('env', 'HOME') }}/.local/bin"
    node_archive: "node-v{{ node_version }}-{{ node_arch }}.tar.xz"
    node_url: "https://nodejs.org/dist/v{{ node_version }}/{{ node_archive }}"
    node_extracted_dir: "{{ node_install_dir }}/node-v{{ node_version }}-{{ node_arch }}"

  tasks:
    - name: Clean up nvm config from shell profiles
      ansible.builtin.lineinfile:
        path: "{{ item }}"
        regexp: "^export NVM_DIR|^\\[ -s.*nvm"
        state: absent
      loop:
        - "{{ lookup('env', 'HOME') }}/.bashrc"
        - "{{ lookup('env', 'HOME') }}/.zshrc"
      failed_when: false

    - name: Check if Node.js {{ node_version }} is already installed
      ansible.builtin.stat:
        path: "{{ node_extracted_dir }}"
      register: node_stat

    - name: Create install and bin directories
      ansible.builtin.file:
        path: "{{ item }}"
        state: directory
        mode: '0755'
      loop:
        - "{{ node_install_dir }}"
        - "{{ node_bin_dir }}"
      when: not node_stat.stat.exists

    - name: Download Node.js {{ node_version }} ({{ node_arch }})
      ansible.builtin.get_url:
        url: "{{ node_url }}"
        dest: "/tmp/{{ node_archive }}"
        mode: '0644'
      when: not node_stat.stat.exists

    - name: Extract Node.js
      ansible.builtin.unarchive:
        src: "/tmp/{{ node_archive }}"
        dest: "{{ node_install_dir }}"
        remote_src: true
      when: not node_stat.stat.exists

    - name: Create bin symlinks
      ansible.builtin.file:
        src: "{{ node_extracted_dir }}/bin/{{ item }}"
        dest: "{{ node_bin_dir }}/{{ item }}"
        state: link
      loop:
        - node
        - npm
        - npx

    - name: Ensure ~/.local/bin is in PATH in .bashrc
      ansible.builtin.lineinfile:
        path: "{{ lookup('env', 'HOME') }}/.bashrc"
        line: 'export PATH="$HOME/.local/bin:$PATH"'
        regexp: 'export PATH=.*\.local/bin'
        state: present

    - name: Ensure ~/.local/bin is in PATH in .zshrc
      ansible.builtin.lineinfile:
        path: "{{ lookup('env', 'HOME') }}/.zshrc"
        line: 'export PATH="$HOME/.local/bin:$PATH"'
        regexp: 'export PATH=.*\.local/bin'
        state: present
      failed_when: false

    - name: Clean up downloaded archive
      ansible.builtin.file:
        path: "/tmp/{{ node_archive }}"
        state: absent

    - name: Show installed version
      ansible.builtin.debug:
        msg: "Node.js v{{ node_version }} ({{ node_arch }}) installed at {{ node_extracted_dir }}"
