---
- name: Install NPM packages (codex and gemini-cli)
  hosts: localhost
  connection: local
  vars:
    npm_packages:
      - codex
      - "@google/gemini-cli"

  tasks:
    - name: Check if npm is available
      command: npm --version
      register: npm_check
      changed_when: false
      failed_when: npm_check.rc != 0

    - name: Install global NPM packages
      npm:
        name: "{{ item }}"
        global: true
        state: latest
      loop: "{{ npm_packages }}"
      register: npm_install

    - name: Get installed package versions
      shell: npm list -g "{{ item }}" --depth=0 2>/dev/null | grep "{{ item }}" || echo "Not found"
      loop: "{{ npm_packages }}"
      register: package_versions
      changed_when: false

    - name: Print installed package versions
      debug:
        msg: "{{ item.stdout }}"
      loop: "{{ package_versions.results }}"
