---
- name: Uninstall Node.js LTS via nvm
  hosts: "{{ target_hosts | default('localhost') }}"
  gather_facts: no
  vars:
    nvm_dir: "{{ lookup('env', 'HOME') }}/.nvm"

  tasks:
    - name: Remove nvm directory
      ansible.builtin.file:
        path: "{{ nvm_dir }}"
        state: absent
      register: nvm_removed

    - name: Clean up nvm config from shell profiles
      ansible.builtin.lineinfile:
        path: "{{ item }}"
        regexp: "^export NVM_DIR|^\\[ -s.*nvm\\.sh|^\\[ -s.*nvm bash_completion"
        state: absent
      loop:
        - "{{ lookup('env', 'HOME') }}/.bashrc"
        - "{{ lookup('env', 'HOME') }}/.zshrc"
      failed_when: false

    - name: Print uninstall status
      ansible.builtin.debug:
        msg: "Node.js and nvm removed from {{ nvm_dir }}"