---
- name: Uninstall Node.js
  hosts: "{{ target_hosts | default('localhost') }}"
  gather_facts: yes
  vars:
    node_version: "24.14.0"
    node_arch: "{{ 'linux-arm64' if ansible_facts['architecture'] == 'aarch64' else 'linux-x64' }}"
    node_install_dir: "{{ lookup('env', 'HOME') }}/.local/lib/nodejs"
    node_bin_dir: "{{ lookup('env', 'HOME') }}/.local/bin"
    node_extracted_dir: "{{ node_install_dir }}/node-v{{ node_version }}-{{ node_arch }}"

  tasks:
    - name: Remove bin symlinks
      ansible.builtin.file:
        path: "{{ node_bin_dir }}/{{ item }}"
        state: absent
      loop:
        - node
        - npm
        - npx

    - name: Remove Node.js directory
      ansible.builtin.file:
        path: "{{ node_extracted_dir }}"
        state: absent

    - name: Remove PATH entry from shell profiles
      ansible.builtin.lineinfile:
        path: "{{ item }}"
        regexp: '^export PATH="\$HOME/\.local/bin:\$PATH"$'
        state: absent
      loop:
        - "{{ lookup('env', 'HOME') }}/.bashrc"
        - "{{ lookup('env', 'HOME') }}/.zshrc"
      failed_when: false

    - name: Show uninstall status
      ansible.builtin.debug:
        msg: "Node.js v{{ node_version }} ({{ node_arch }}) removed from {{ node_extracted_dir }}"
